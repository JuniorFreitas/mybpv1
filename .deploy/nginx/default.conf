server {
    listen   80; ## listen for ipv4; this line is default and implied
    listen   [::]:80 default ipv6only=on; ## listen for ipv6

    set_real_ip_from  0.0.0.0/0;
    real_ip_header    X-Real-IP;

    client_max_body_size 800M;

    client_header_timeout 90s; #1 min e meio
    client_body_timeout 90s; #1 min e meio
    send_timeout 90s; #1 min e meio
    keepalive_timeout 90s; #1 min e meio

    root /usr/share/nginx/html/public;
    index index.php index.html index.htm;

    # Add stdout logging
    error_log /dev/stdout info;
    access_log /dev/stdout;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
        proxy_read_timeout 1500;
    }

    #location /images/ {
    #    proxy_cache_valid 200 60m;
    #    proxy_cache_key "$scheme$request_method$host$request_uri";
    #    proxy_cache_bypass $http_pragma;
    #    proxy_cache_revalidate on;

        # Proxy pass to Laravel
    #    proxy_pass http://seu-servidor-laravel/images/;

        # Proxy pass to S3
    #    resolver 8.8.8.8 valid=300s;
    #    set $s3_bucket "seu-bucket";
    #    proxy_pass https://$s3_bucket.s3.amazonaws.com/;
    #    proxy_set_header Host s3.amazonaws.com;
    #}

    # Pass the PHP scripts to FastCGI server listening on socket
    location ~ \.php$ {
        try_files $uri /index.php =404;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_hide_header X-Powered-By;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 1500;
        include fastcgi_params;
    }

    # Media: images, icons, video, audio, HTC
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|ttf|woff|woff2)$ {
        expires 1d;
        access_log off;
        add_header Cache-Control "public";
        add_header 'Access-Control-Allow-Origin' '*';
        try_files $uri $uri/ /index.php$is_args$args;
    }
}
