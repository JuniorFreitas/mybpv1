image: node:14

pipelines:
  default:
    - step:
        name: Acessar EC2 via SSH
        services:
          - docker
        caches:
          - docker
        script:
          - apt-get update && apt-get install -y openssh-client
          - touch ~/mybpin.pem
          - echo "${MYBPIN}" > ~/mybpin.pem
          - chmod 400 ~/mybpin.pem
          - cat ~/mybpin.pem
          - ssh -i "~/mybpin.pem" ${USER_MYBP}@${HOST_HOMOL} "ls -la"
    - step:
        name: Teste
        script:
          - echo "Teste executado com sucesso"
