image: node:14

pipelines:
  default:
    - step:
        name: Acessar EC2 via SSH
        services:
          - docker
        caches:
          - docker
        script:
          - apt-get update && apt-get install -y openssh-client
          - echo -e "Host ec2\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile=/dev/null" >> ~/.ssh/config
          - echo -e "${MYBPIN}" > ~/.ssh/aws_rsa
          - chmod 400 ~/.ssh/aws_rsa
          - echo -e "Host ec2\n\tHostName ${HOST_HOMOL}\n\tUser ${USER_MYBP}\n\tIdentityFile ~/.ssh/aws_rsa" > aws_ssh_config
          - ssh -F aws_ssh_config ${USER_MYBP}@${HOST_HOMOL} ls -la
    - step:
        name: Teste
        script:
          - echo "Teste executado com sucesso"
