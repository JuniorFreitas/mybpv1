image: atlassian/default-image:2

pipelines:
  default:
    - step:
        name: Criando host
        script:
          - apt-get update
          - apt-get install -yqq openssh-client
          - mkdir -p "${PWD}/.ssh"
          - echo "$MYBPIN" | base64 -d > "${PWD}/.ssh/aws.pem"
          - chmod 600 "${PWD}/.ssh/aws.pem"
          
          #- ssh -o StrictHostKeyChecking=no -i ~/.ssh/aws.pem ubuntu@3.224.176.151 "ls -la"
    - step:
        name: Connecting to server
        script:
          - ssh -i "${PWD}/.ssh/aws.pem" ubuntu@3.224.176.151 "ls -la"